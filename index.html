<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://cdn.discordapp.com/attachments/766335209229778968/1125200743058649128/Fichier_1.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/gh/macmcmeans/localDataStorage@master/localDataStorage-3.0.0.min.js"
        integrity="sha512-dEhk3bL90qpWkcHCJDErHbZEY7hGc4ozmKss33HSjwMeSBKBtiw/XVIE7tb5u+iOEp6dTIR9sCWW7J3txeTQIw=="
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js"
        integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ=" crossorigin="anonymous"></script>
    <title>kwiik 0.4</title>
</head>

<body>
    <div class="loader">
        <span class="loading-text">Loading</span>
        <img class="loading-img" src="https://cdn.discordapp.com/attachments/997177797128769536/1125166154059628655/Fichier_1.png" />
    </div>
    <div class="globalWin">
        <div class="leftArea">
            <div class="logodiv"> 
                <img class="logo"src="https://cdn.discordapp.com/attachments/997177797128769536/1125166154059628655/Fichier_1.png" />
            </div>
            <div class="bigKiwi">
                <img id=makeKiwiButton onclick="Game.makeKiwi()"
                    src="https://cdn.discordapp.com/attachments/997177797128769536/1125165506563936457/KIWI.png">
            </div>
            <div class="kiwicounter" id="kiwiCounter">
                <p id="kiwiCounterText">0 kiwis</p>
                <p id="kiwiMakeCountText">- kiwis per click</p>
                <p id="kiwiAutoMakeCountText">- kiwis per second</p>
            </div>
        </div>
        <div class="rightArea">
            <div class="topBar">
                <div class="resetbutton" id="resetButton" onclick="Game.resetSave()">RESET SAVE</div>
                <div class="resetbutton" id="resetButton" onclick="Game.openSettings()">SETTINGS</div>
            </div>
            <div class="shop">
                <div class="upgrades" id=buyRootButton onclick="Game.buyRoot()"> <img id=Icons class="buyIcon"
                        src="iconsSVG/roots.svg">buy root (10)</div>
                <div class="upgrades" id=buyPressButton onclick="Game.buyPress()"><img id=Icons class="buyIcon"
                        src="iconsSVG/press.svg">buy press (500)</div>
                <div class="upgrades" id=buyExtractorButton onclick="Game.buyExtractor()"><img id=Icons
                        class="buyIcon" src="iconsSVG/extractor.svg">buy extractor (15k)</div>
            </div>
            <div class="globalcounters">
                <div class="counter" id="rootCounter">
                    <p id="rootCounterText">1 roots</p>
                </div>
                <div class="counter" id="pressCounter">
                    <p id="pressCounterText">0 presses</p>
                </div>
                <div class="counter" id="extractorCounter">
                    <p id="extractorCounterText">0 extractors</p>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script src="root.js"></script>
    <script src="press.js"></script>
    <script src="extractor.js"></script>
    <script src="golden-kiwi.js"></script>
    <script src="settings.js"></script>
    <script src="save.js"></script>
</body>

</html>
